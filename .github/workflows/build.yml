name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          sdkmanager --install "cmake;3.22.1"

      - name: Generate Gradle Wrapper JAR
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.9/bin/gradle wrapper --gradle-version 8.9 --project-dir .
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache CMake build (Oboe FetchContent)
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('app/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JvkStudioMobile-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: JvkStudioMobile-release-unsigned-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
